services:
  - type: web
    name: dr-insights-backend
    env: python
    region: frankfurt
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn -c gunicorn.conf.py app.main:app"
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./dr_insights.db
      - key: PYTHON_VERSION
        value: 3.10.0
